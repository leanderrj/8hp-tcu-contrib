# CarOS vehicle profile — ZombieVerter VCU + openinverter ZF 8HP TCU
#
# Drop-in profile for `caros/profiles/ev_conversions/zombieverter_8hp.yaml`.
# Format mirrors `zombieverter_generic.yaml` — every signal CarOS already
# knows how to read, plus the transmission frames from
# proposals/dbc/zf8hp-tcu.dbc.
#
# Once installed, CarOS gets dashboards, MQTT publishing, trip logging,
# and Matter device exposure for the gearbox automatically. No CarOS
# code changes required — the YAML is the integration.

vehicle:
  name: "EV Conversion — ZombieVerter + ZF 8HP TCU + SimpBMS"
  type: ev_conversion
  year: 0
  base: zombieverter_generic
  description: >-
    Adds the openinverter in-Mechatronik 8HP TCU to the standard
    ZombieVerter+SimpBMS stack. CarOS reads transmission status passively;
    actuation is performed exclusively by the TCU (ASIL B/C scope, see
    proposals/safety/hara.py for the formal HARA).

# Inherits everything from zombieverter_generic.yaml. We extend the can.messages
# block with the five TCU<->VCU frames and add a `transmission` top-level
# section for the dashboard.

can:
  interface: can0
  bitrate: 500000
  dbc_files:
    - "dbc/zombieverter_simpbms.dbc"
    - "dbc/zf8hp-tcu.dbc"

  messages:
    # ===== TCU -> VCU primary status (20 ms cyclic) =====
    tcu_status1:
      id: 0x540
      direction: rx
      period_ms: 20
      signals:
        current_gear:
          start_bit: 0
          bit_length: 4
          mqtt_topic: "car/telemetry/transmission/current_gear"
          enum:
            0: "Neutral"
            1: "G1"
            2: "G2"
            3: "G3"
            4: "G4"
            5: "G5"
            6: "G6"
            7: "G7"
            8: "G8"
            9: "Reverse"
            14: "Shifting"
            15: "Invalid"
        target_gear_echo:
          start_bit: 4
          bit_length: 4
          mqtt_topic: "car/telemetry/transmission/target_gear"
        tcu_state:
          start_bit: 8
          bit_length: 4
          mqtt_topic: "car/telemetry/transmission/state"
          enum:
            0: "Init"
            1: "Idle"
            2: "Park"
            3: "Reverse"
            4: "Neutral"
            5: "Drive"
            6: "Shifting"
            7: "NeutralHold"
            8: "Limp"
            15: "Fault"
        shift_in_progress:
          start_bit: 12
          bit_length: 1
          mqtt_topic: "car/telemetry/transmission/shifting"
        tcu_ready:
          start_bit: 13
          bit_length: 1
          mqtt_topic: "car/telemetry/transmission/ready"
        any_fault:
          start_bit: 14
          bit_length: 1
          mqtt_topic: "car/telemetry/transmission/fault"
        park_lock:
          start_bit: 15
          bit_length: 1
          mqtt_topic: "car/telemetry/transmission/park_lock"
        input_shaft_rpm:
          start_bit: 16
          bit_length: 16
          unit: "rpm"
          mqtt_topic: "car/telemetry/transmission/input_rpm"
        output_shaft_rpm:
          start_bit: 32
          bit_length: 16
          unit: "rpm"
          mqtt_topic: "car/telemetry/transmission/output_rpm"
        oil_temp:
          start_bit: 48
          bit_length: 8
          signed: true
          offset: -40
          unit: "°C"
          mqtt_topic: "car/telemetry/transmission/oil_temp"
        line_pressure:
          start_bit: 56
          bit_length: 8
          factor: 0.1
          unit: "bar"
          mqtt_topic: "car/telemetry/transmission/line_pressure"

    # ===== TCU -> VCU diagnostics (100 ms cyclic) =====
    tcu_status2:
      id: 0x541
      direction: rx
      period_ms: 100
      signals:
        sol_a_current:
          start_bit: 0
          bit_length: 16
          unit: "mA"
          mqtt_topic: "car/telemetry/transmission/solenoid_a_current"
        sol_b_current:
          start_bit: 16
          bit_length: 16
          unit: "mA"
          mqtt_topic: "car/telemetry/transmission/solenoid_b_current"
        fault_bits:
          start_bit: 32
          bit_length: 16
          mqtt_topic: "car/telemetry/transmission/fault_bits"
          # Bit layout per proposals/firmware/solenoid_driver/solenoids.cpp
          bit_meanings:
            0: "SolenoidOpenLoad"
            1: "SolenoidShortToSupply"
            2: "OilTempHigh"
            3: "LinePressureLow"
            4: "SpeedSensorFault"
            5: "LinCommFault"
            6: "CanStale"
            7: "SolenoidOverCurrent"
            8: "ParkPositionSensorFault"
            9: "MAX22200_Chip0_Unresponsive"
            10: "MAX22200_Chip1_Unresponsive"
        shift_count:
          start_bit: 48
          bit_length: 8
          mqtt_topic: "car/telemetry/transmission/shift_count"
        tcu_hw_temp:
          start_bit: 56
          bit_length: 8
          signed: true
          offset: -40
          unit: "°C"
          mqtt_topic: "car/telemetry/transmission/tcu_temp"

    # ===== TCU -> VCU shift handshake (20 ms cyclic) =====
    tcu_shift_status:
      id: 0x543
      direction: rx
      period_ms: 20
      signals:
        shift_phase:
          start_bit: 0
          bit_length: 3
          mqtt_topic: "car/telemetry/transmission/shift_phase"
          enum:
            0: "Idle"
            1: "PreFill"
            2: "TorqueCut"
            3: "Overlap"
            4: "Complete"
            5: "Limp"
        torque_cut_request:
          start_bit: 3
          bit_length: 1
          mqtt_topic: "car/telemetry/transmission/torque_cut_request"
        shift_active:
          start_bit: 4
          bit_length: 1
          mqtt_topic: "car/telemetry/transmission/shift_active"
        shift_fault_code:
          start_bit: 5
          bit_length: 3
          mqtt_topic: "car/telemetry/transmission/shift_fault"
          enum:
            0: "None"
            1: "InvalidTargetGear"
            2: "TorqueCutTimeout"
            3: "OverlapTimeout"
            4: "ClutchTableInconsistent"
        shift_ramp_percent:
          start_bit: 8
          bit_length: 8
          unit: "%"
          mqtt_topic: "car/telemetry/transmission/shift_ramp"
        shift_elapsed_ms:
          start_bit: 16
          bit_length: 16
          unit: "ms"
          mqtt_topic: "car/telemetry/transmission/shift_elapsed"

    # ===== TCU -> VCU pump status (HZ hybrid only, 100 ms cyclic) =====
    tcu_pump_status:
      id: 0x542
      direction: rx
      period_ms: 100
      optional: true   # absent on non-hybrid 8HP variants
      signals:
        pump_state:
          start_bit: 0
          bit_length: 3
          mqtt_topic: "car/telemetry/transmission/pump/state"
          enum:
            0: "Off"
            1: "Coldstart"
            2: "Phase2Ready"
            3: "Run"
            4: "WatchdogFault"
            5: "AltFault"
            6: "NotPresent"
            7: "Reserved"
        pump_run_ack:
          start_bit: 3
          bit_length: 1
          mqtt_topic: "car/telemetry/transmission/pump/run_ack"
        pump_lin_fault:
          start_bit: 4
          bit_length: 1
          mqtt_topic: "car/telemetry/transmission/pump/lin_fault"
        pump_alt_fault:
          start_bit: 5
          bit_length: 1
          mqtt_topic: "car/telemetry/transmission/pump/alt_fault"
        pump_rpm:
          start_bit: 16
          bit_length: 16
          unit: "rpm"
          mqtt_topic: "car/telemetry/transmission/pump/rpm"
        pump_voltage:
          start_bit: 32
          bit_length: 8
          factor: 0.1
          unit: "V"
          mqtt_topic: "car/telemetry/transmission/pump/voltage"

    # ===== VCU -> TCU command frames (rx-only from CarOS perspective —
    # CarOS does NOT inject these. Listed for monitoring/logging only.)
    vcu_gear_request:
      id: 0x520
      direction: rx_monitor   # do NOT transmit from CarOS
      period_ms: 20
      signals:
        target_gear:
          start_bit: 0
          bit_length: 4
          mqtt_topic: "car/telemetry/transmission/requested_gear"

# Dashboard surface — the widgets CarOS should render for this profile.
# Wired up by CarOS automatically based on the per-signal mqtt_topic.
transmission:
  type: zf_8hp
  variant: GA8P75HZ      # change to e.g. 8HP70 for non-hybrid
  tcu: openinverter_oi_8hp
  dbc_file: "dbc/zf8hp-tcu.dbc"

  dashboard_widgets:
    - kind: gear_indicator
      title: "Gear"
      topic: "car/telemetry/transmission/current_gear"
    - kind: gauge
      title: "Oil temp"
      topic: "car/telemetry/transmission/oil_temp"
      range: [-40, 150]
      warn_above: 120
    - kind: gauge
      title: "Line pressure"
      topic: "car/telemetry/transmission/line_pressure"
      range: [0, 25]
    - kind: gauge
      title: "Input shaft RPM"
      topic: "car/telemetry/transmission/input_rpm"
      range: [0, 8000]
    - kind: gauge
      title: "Output shaft RPM"
      topic: "car/telemetry/transmission/output_rpm"
      range: [0, 8000]
    - kind: light
      title: "Park lock"
      topic: "car/telemetry/transmission/park_lock"
    - kind: light
      title: "TCU fault"
      topic: "car/telemetry/transmission/fault"
      severity: warning
    - kind: light
      title: "Aux pump fault (hybrid only)"
      topic: "car/telemetry/transmission/pump/lin_fault"
      severity: warning

# Safety configuration — CarOS reads but does NOT actuate the gearbox.
# These thresholds drive ALERTS only (push notification, dashboard
# warning), not control actions. Powertrain control is the TCU's job.
safety:
  # Per HARA T002 (ASIL D rollaway): if CarOS sees ParkLock=0 with VCU
  # ignition off, raise an immediate alert.
  alerts:
    park_not_engaged_at_shutdown:
      condition: |
        ignition_off AND
        car/telemetry/transmission/park_lock == 0
      severity: critical
      message: "Park lock not engaged at shutdown — engage parking brake"
      ftti_hint_ms: 500

    # Per HARA T009: aux pump fault during drive (hybrid only).
    aux_pump_fault_in_drive:
      condition: |
        car/telemetry/transmission/state IN ("Drive", "Reverse") AND
        car/telemetry/transmission/pump/lin_fault == 1
      severity: warning
      message: "Aux 12V pump LIN fault — pull over and restart vehicle"

    # Per HARA T007: VCU silent + TCU still on → CAN bus issue.
    transmission_can_stale:
      condition: |
        car/telemetry/transmission/fault == 1 AND
        last_seen_ms("car/telemetry/transmission/current_gear") > 200
      severity: warning
      message: "Transmission CAN stale — check VCU<->TCU bus"

    # Generic transmission fault from the TCU.
    transmission_any_fault:
      condition: |
        car/telemetry/transmission/fault == 1
      severity: warning
      message: "Transmission TCU reports fault — check fault_bits"

# Trip logging — fields to capture per drive episode.
trip_logging:
  fields:
    - "current_gear"
    - "shift_count"
    - "oil_temp"
    - "line_pressure"
    - "tcu_hw_temp"
    - "input_rpm"
    - "output_rpm"
    - "pump_rpm"

# Matter device exposure (HomeKit / Google Home / Alexa).
matter:
  devices:
    - name: "Transmission Status"
      kind: contact_sensor    # closed = OK, open = fault
      topic_open_when: "car/telemetry/transmission/fault == 1"
    - name: "Park Lock"
      kind: contact_sensor
      topic_open_when: "car/telemetry/transmission/park_lock == 0"
